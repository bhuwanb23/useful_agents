version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: github-agent-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: github_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - github-agent-network

  # Redis for BullMQ
  redis:
    image: redis:7-alpine
    container_name: github-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - github-agent-network

  # Ollama Server 1 (Primary)
  ollama-1:
    image: ollama/ollama:latest
    container_name: github-agent-ollama-1
    ports:
      - "11434:11434"
    volumes:
      - ollama_1_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    # Uncomment for GPU support
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - github-agent-network

  # Ollama Server 2 (Load Balancing - Optional)
  ollama-2:
    image: ollama/ollama:latest
    container_name: github-agent-ollama-2
    ports:
      - "11435:11434"
    volumes:
      - ollama_2_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - github-agent-network
    profiles:
      - multi-instance

  # Ollama Server 3 (Load Balancing - Optional)
  ollama-3:
    image: ollama/ollama:latest
    container_name: github-agent-ollama-3
    ports:
      - "11436:11434"
    volumes:
      - ollama_3_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - github-agent-network
    profiles:
      - multi-instance

  # pgAdmin (Optional - Database Management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: github-agent-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@github-agent.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - github-agent-network
    profiles:
      - tools

  # Redis Commander (Optional - Redis Management UI)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: github-agent-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - github-agent-network
    profiles:
      - tools

  # ChromaDB (Vector Database for RAG)
  chromadb:
    image: chromadb/chroma:latest
    container_name: github-agent-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    networks:
      - github-agent-network

  # Docker-in-Docker for code execution sandbox
  docker-dind:
    image: docker:24-dind
    container_name: github-agent-dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - docker_certs:/certs
      - docker_data:/var/lib/docker
    networks:
      - github-agent-network

volumes:
  postgres_data:
  redis_data:
  ollama_1_data:
  ollama_2_data:
  ollama_3_data:
  chroma_data:
  docker_certs:
  docker_data:

networks:
  github-agent-network:
    driver: bridge
