# config/agent_config.yaml
# Per-agent tuning — no code changes needed to adjust behaviour

system:
  name: "GitHub Agent System"
  version: "1.0.0"
  log_level: "INFO"
  fetch_interval_seconds: 300      # how often to poll GitHub
  max_concurrent_tasks: 4

# ── GitHub ──────────────────────────────────────────────────
github:
  max_issues_per_run: 10
  base_branch: "main"
  labels_to_watch:
    - bug
    - good-first-issue
    - help-wanted
    - documentation
  skip_labels:
    - wontfix
    - duplicate
    - invalid
  protected_files:
    - ".env"
    - ".github/workflows/"
    - "package-lock.json"
    - "yarn.lock"
    - "Makefile"
    - "Dockerfile"

# ── Ollama ──────────────────────────────────────────────────
ollama:
  default_model: "codellama"
  timeout_seconds: 120
  context_window: 8192

  # Use different models for different agents
  agent_models:
    issue_analyzer:    "llama3"        # good at understanding
    code_fixer:        "codellama"     # best for code
    code_reviewer:     "codellama"     # best for code
    security_scanner:  "codellama"     # best for code
    test_writer:       "codellama"     # best for code
    docs_writer:       "mistral"       # good at writing
    dependency_agent:  "llama3"        # good at reasoning
    pr_manager:        "mistral"       # good at writing
    notification_agent: "mistral"      # good at writing

# ── Agents ──────────────────────────────────────────────────
agents:

  issue_analyzer:
    enabled: true
    max_complexity: "medium"          # skip "complex" issues
    min_confidence: 60               # skip if LLM is not confident
    temperature: 0.1

  code_fixer:
    enabled: true
    max_files_per_issue: 5
    max_file_size_bytes: 50000
    temperature: 0.15
    validate_syntax: true

  code_reviewer:
    enabled: true
    min_score_to_approve: 65         # 0-100
    temperature: 0.1
    block_on_security: true

  security_scanner:
    enabled: true
    block_on_critical: true
    block_on_high: false
    temperature: 0.05

  test_writer:
    enabled: true
    frameworks:
      python: pytest
      javascript: jest
      typescript: jest
      java: junit
    temperature: 0.2

  docs_writer:
    enabled: true
    update_readme: true
    update_changelog: true
    add_docstrings: true
    temperature: 0.3

  dependency_agent:
    enabled: true
    auto_update: false               # set true to auto-bump versions
    block_breaking_changes: true
    temperature: 0.05

  pr_manager:
    enabled: true
    draft_prs: false                 # open as draft for safety
    temperature: 0.4

  notification_agent:
    enabled: true
    comment_on_issue: true
    temperature: 0.3

# ── Safety ──────────────────────────────────────────────────
safety:
  max_lines_changed_pct: 50         # block if >50% of file changes
  require_review_for_complex: true
  dry_run: false                    # true = analyze but don't push