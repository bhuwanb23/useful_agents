# docker-compose.yml

version: '3.8'

services:
  # The main agent system
  github-agent:
    build: .
    container_name: github-agent
    restart: unless-stopped
    ports:
      - "5000:5000"       # Dashboard
    volumes:
      - ./logs:/app/logs
      - ./agent_memory.db:/app/agent_memory.db
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=codellama
    depends_on:
      - ollama
    networks:
      - agent-network

  # Ollama - runs the LLM locally
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agent-network
    # If you have GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama_data:

networks:
  agent-network:
    driver: bridge